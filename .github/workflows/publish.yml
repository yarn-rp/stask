name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    # Skip if the commit was the version bump itself
    if: "!contains(github.event.head_commit.message, 'chore: release')"

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Create test config
        run: |
          mkdir -p ~/.stask
          cp config.example.json ~/.stask/config.json

      - run: npm test

      - name: Bump version and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Pull any commits that landed on main between checkout and now so
          # the version bump commit cleanly fast-forwards on push.
          git pull --rebase origin main
          npm version patch -m "chore: release v%s"
          git push --follow-tags

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
